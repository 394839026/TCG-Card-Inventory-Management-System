<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG 卡牌管理 - 线上独立账号版</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root { --primary: #4361ee; --card-bg: #fff; --body-bg: #f8f9fc; --text: #21252d; }
.dark-mode { --primary: #8ab4f8; --card-bg: #1e1e2e; --body-bg: #121212; --text: #e9ecef; }
body { background: var(--body-bg); color: var(--text); transition: 0.3s; }
.card { background: var(--card-bg) !important; border: 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.btn-primary { background: var(--primary) !important; border: 0; }
.card-img-preview { width:100%; height:160px; object-fit:cover; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div class="container py-4">
  <!-- 登录注册面板 -->
  <div id="authPanel" class="card p-4 mx-auto mt-5" style="max-width:400px">
    <h3 class="text-center mb-3">TCG 线上管理系统</h3>
    <input class="form-control mb-2" id="userName" placeholder="用户名">
    <input class="form-control mb-2" id="userPwd" type="password" placeholder="密码">
    <button class="btn btn-primary w-100 mb-2" onclick="userLogin()">登录</button>
    <button class="btn btn-outline-secondary w-100" onclick="userRegister()">注册</button>
    <div class="mt-2 text-center small text-muted">每人独立账号，数据互不通用</div>
  </div>

  <!-- 主系统 -->
  <div id="mainPanel" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="bi bi-collection"></i> 我的卡牌库存</h2>
      <div class="d-flex gap-2">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="hideZeroStock">
          <label class="form-check-label">库存0隐藏</label>
        </div>
        <button class="btn btn-sm btn-danger" onclick="userLogout()">退出</button>
      </div>
    </div>

    <input class="form-control mb-3" id="globalSearch" placeholder="搜索卡牌名称/版本/稀有度" oninput="doSearch()">

    <div class="mb-4 flex-wrap d-flex gap-2">
      <button class="btn btn-primary" onclick="showPage('cards')">卡牌列表</button>
      <button class="btn btn-primary" onclick="showPage('trades')">交易记录</button>
      <button class="btn btn-primary" onclick="showPage('addCard')">添加卡牌</button>
      <button class="btn btn-success" onclick="exportExcel()">导出Excel</button>
      <button class="btn btn-warning" onclick="importExcel()">导入Excel</button>
    </div>

    <!-- 卡牌列表 -->
    <div id="cards" class="page">
      <div class="row g-3" id="cardGrid"></div>
    </div>

    <!-- 交易记录 -->
    <div id="trades" class="page d-none">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead><tr><th>ID</th><th>卡牌</th><th>类型</th><th>金额</th><th>日期</th></tr></thead>
          <tbody id="tradeTable"></tbody>
        </table>
      </div>
    </div>

    <!-- 添加卡牌 -->
    <div id="addCard" class="page d-none">
      <div class="card p-4">
        <input class="form-control mb-2" id="cName" placeholder="卡牌名称">
        <input class="form-control mb-2" id="cSet" placeholder="版本">
        <input class="form-control mb-2" id="cRare" placeholder="稀有度">
        <input class="form-control mb-2" id="cQty" type="number" placeholder="库存数量">
        <input class="form-control mb-2" id="cPrice" placeholder="市场价">
        <input class="form-control mb-2" id="cActual" placeholder="成本价">
        <button class="btn btn-primary w-100" onclick="addCard()">保存卡牌</button>
      </div>
    </div>
  </div>
</div>

<script>
// ================ 核心：用户系统 + 独立存储 ================
let currentUserName = null;

// 注册
function userRegister() {
  const name = document.getElementById('userName').value.trim();
  const pwd = document.getElementById('userPwd').value.trim();
  if (!name || !pwd) return alert('请输入用户名和密码');
  if (localStorage.getItem('user_' + name)) return alert('用户名已存在');

  const userData = {
    pwd: pwd,
    cards: [],
    trades: []
  };
  localStorage.setItem('user_' + name, JSON.stringify(userData));
  alert('注册成功！请登录');
}

// 登录
function userLogin() {
  const name = document.getElementById('userName').value.trim();
  const pwd = document.getElementById('userPwd').value.trim();
  const userStr = localStorage.getItem('user_' + name);
  if (!userStr) return alert('用户不存在');

  const user = JSON.parse(userStr);
  if (user.pwd !== pwd) return alert('密码错误');

  currentUserName = name;
  document.getElementById('authPanel').classList.add('d-none');
  document.getElementById('mainPanel').classList.remove('d-none');
  loadUserData();
  showPage('cards');
}

// 退出
function userLogout() {
  currentUserName = null;
  location.reload();
}

// 加载当前用户数据
let db = { cards: [], trades: [] };
function loadUserData() {
  const user = JSON.parse(localStorage.getItem('user_' + currentUserName));
  db.cards = user.cards || [];
  db.trades = user.trades || [];
}

// 保存当前用户数据
function saveUserData() {
  const user = JSON.parse(localStorage.getItem('user_' + currentUserName));
  user.cards = db.cards;
  user.trades = db.trades;
  localStorage.setItem('user_' + currentUserName, JSON.stringify(user));
}

// ================ 以下完全兼容你原有系统 ================
let currentSearch = '';
function doSearch() {
  currentSearch = document.getElementById('globalSearch').value.toLowerCase();
  loadCards();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('d-none'));
  document.getElementById(id).classList.remove('d-none');
  id === 'cards' && loadCards();
  id === 'trades' && loadTrades();
}

function isHideZero() {
  return document.getElementById('hideZeroStock').checked;
}

// 卡牌列表
function loadCards() {
  const g = document.getElementById('cardGrid');
  g.innerHTML = '';
  const hide = isHideZero();

  db.cards.forEach((c, idx) => {
    if (hide && c.qty <= 0) return;
    const txt = (c.name + c.set + c.rarity).toLowerCase();
    if (currentSearch && !txt.includes(currentSearch)) return;

    g.innerHTML += `
    <div class="col-md-6 col-lg-3">
      <div class="card p-3 h-100">
        <h6 class="mt-0">${c.name}</h6>
        <small class="text-muted">${c.set || ''} ${c.rarity || ''}</small>
        <div>库存：${c.qty}</div>
        <div>市场价：${c.price}</div>
        <div class="text-primary">成本：${c.actual}</div>
        <div class="d-flex gap-2 mt-2">
          <button class="btn btn-sm btn-warning flex-1" onclick="editCard(${idx})">修改</button>
          <button class="btn btn-sm btn-danger flex-1" onclick="delCard(${idx})">删除</button>
        </div>
      </div>
    </div>`;
  });
}

// 添加卡牌
function addCard() {
  const card = {
    name: document.getElementById('cName').value,
    set: document.getElementById('cSet').value,
    rarity: document.getElementById('cRare').value,
    qty: +document.getElementById('cQty').value || 0,
    price: +document.getElementById('cPrice').value || 0,
    actual: +document.getElementById('cActual').value || 0
  };
  if (!card.name) return alert('请输入名称');
  db.cards.push(card);
  saveUserData();
  alert('保存成功');
  showPage('cards');
}

// 修改卡牌
function editCard(idx) {
  const c = db.cards[idx];
  document.getElementById('cName').value = c.name;
  document.getElementById('cSet').value = c.set || '';
  document.getElementById('cRare').value = c.rarity || '';
  document.getElementById('cQty').value = c.qty;
  document.getElementById('cPrice').value = c.price;
  document.getElementById('cActual').value = c.actual;
  showPage('addCard');
  setTimeout(() => {
    db.cards.splice(idx, 1);
  }, 0);
}

// 删除卡牌
function delCard(idx) {
  if (!confirm('确定删除？')) return;
  db.cards.splice(idx, 1);
  saveUserData();
  loadCards();
}

// 交易记录
function loadTrades() {
  const t = document.getElementById('tradeTable');
  t.innerHTML = '';
  db.trades.forEach((tr, i) => {
    t.innerHTML += `<tr>
      <td>${i+1}</td>
      <td>${tr.cardName}</td>
      <td>${tr.type}</td>
      <td>${tr.money}</td>
      <td>${tr.date}</td>
    </tr>`;
  });
}

// 导入 Excel
function importExcel() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xlsx';
  inp.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      data.forEach(row => {
        const name = row['名称'] || '';
        if (!name) return;
        const find = db.cards.findIndex(x =>
          x.name === name && x.set === (row['版本'] || '')
        );
        const item = {
          name,
          set: row['版本'] || '',
          rarity: row['稀有度'] || '',
          qty: row['库存'] || 0,
          price: row['市场价'] || 0,
          actual: row['成本价'] || 0
        };
        find >= 0 ? db.cards[find] = item : db.cards.push(item);
      });
      saveUserData();
      alert('导入成功！数据已保存到你的账号');
      loadCards();
    };
    reader.readAsArrayBuffer(e.target.files[0]);
  };
  inp.click();
}

// 导出 Excel
function exportExcel() {
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(db.cards), '卡牌');
  XLSX.writeFile(wb, '我的TCG数据.xlsx');
}
</script>
</body>
</html>
