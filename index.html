<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG卡牌库存管理 - 全能稳定版</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --main: #409eff;
  --bg: #f4f6f9;
  --card: #fff;
  --text: #222;
  --text2: #666;
  --border: #ddd;
}
.dark {
  --bg: #1a1a1a;
  --card: #2a2a2a;
  --text: #eee;
  --text2: #aaa;
  --border: #444;
}
body {
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  transition: all 0.3s;
}
.main-card {
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  border: none;
}
.filter-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.stat-bar {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 16px;
  border: 1px solid var(--border);
}
.btn-sm { border-radius: 8px; }
.tag {
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 12px;
  background: #e6f7ff;
  color: #1890ff;
}
.low-stock { color: red; font-weight: bold; }
.card-item {
  background: var(--card);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  cursor: pointer;
}
.grid-view {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.table-view th { background: var(--card); }
.pagination .page-link { background: var(--card); color: var(--text); border-color: var(--border); }
</style>
</head>
<body class="p-3">

<div class="main-card p-4 mb-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5>🎴 TCG卡牌库存管理 - 全能稳定版</h5>
    <button class="btn btn-sm btn-secondary" onclick="toggleDark()">深色/浅色模式</button>
  </div>

  <div class="stat-bar row g-3 mb-3">
    <div class="col-md-2">总种类: <b id="s1">0</b></div>
    <div class="col-md-2">总张数: <b id="s2">0</b></div>
    <div class="col-md-2">总成本: <b id="s3">0</b></div>
    <div class="col-md-2">总市值: <b id="s4">0</b></div>
    <div class="col-md-2">预估盈亏: <b id="s5" style="color:green">0</b></div>
    <div class="col-md-2">零库存: <b id="s6">0</b></div>
  </div>

  <div class="filter-bar row g-2 mb-3">
    <div class="col-md-2"><input class="form-control form-control-sm" id="kw" placeholder="关键词搜索" oninput="load()"></div>
    <div class="col-md-2"><select class="form-select form-select-sm" id="ver" onchange="load()"></select></div>
    <div class="col-md-2"><select class="form-select form-select-sm" id="rare" onchange="load()"></select></div>
    <div class="col-md-2"><select class="form-select form-select-sm" id="owner" onchange="load()"></select></div>
    <div class="col-md-2"><select class="form-select form-select-sm" id="tag" onchange="load()"></select></div>
    <div class="col-md-2"><select class="form-select form-select-sm" id="stock" onchange="load()"><option value="">全部库存</option><option value="has">有库存</option><option value="zero">零库存</option><option value="gt2">大于2张</option><option value="gt5">大于5张</option></select></div>
    <div class="col-md-3"><select class="form-select form-select-sm" id="price" onchange="load()"><option value="">全部价格</option><option value="0-50">0-50</option><option value="50-200">50-200</option><option value="200+">200以上</option></select></div>
    <div class="col-md-3"><select class="form-select form-select-sm" id="sort" onchange="load()"><option value="">排序</option><option value="code">编号</option><option value="name">名称</option><option value="qty">库存</option><option value="market">市场价</option></select></div>
    <div class="col-md-3"><select class="form-select form-select-sm" id="pageSize" onchange="load()"><option value="20">20条/页</option><option value="50">50条/页</option><option value="100">100条/页</option></select></div>
    <div class="col-md-3"><input class="form-control form-control-sm" id="warn" placeholder="预警数量" value="2" onchange="load()"></div>
  </div>

  <div class="d-flex flex-wrap gap-2 mb-3">
    <button class="btn btn-sm btn-primary" onclick="show('list')">列表</button>
    <button class="btn btn-sm btn-primary" onclick="show('grid')">网格</button>
    <button class="btn btn-sm btn-primary" onclick="show('table')">表格</button>
    <button class="btn btn-sm btn-success" onclick="exportExcel()">导出Excel</button>
    <button class="btn btn-sm btn-info" onclick="template()">模板</button>
    <button class="btn btn-sm btn-warning" onclick="importAdd()">增量导入</button>
    <button class="btn btn-sm btn-danger" onclick="importCover()">覆盖导入</button>
    <button class="btn btn-sm btn-dark" onclick="backup()">备份JSON</button>
    <button class="btn btn-sm btn-secondary" onclick="restore()">恢复JSON</button>
    <button class="btn btn-sm btn-warning" onclick="batchEdit()">批量修改</button>
    <button class="btn btn-sm btn-danger" onclick="batchDel()">批量删除</button>
    <button class="btn btn-sm btn-primary" onclick="showIo()">出入库</button>
    <button class="btn btn-sm btn-info" onclick="showIoLog()">出入库记录</button>
    <button class="btn btn-sm btn-primary" onclick="showLend()">借出管理</button>
  </div>

  <div id="app"></div>
  <div id="pageBar" class="mt-3"></div>
</div>

<script>
let db = {
  cards: JSON.parse(localStorage.getItem('cards')) || [],
  ioLog: JSON.parse(localStorage.getItem('ioLog')) || [],
  lend: JSON.parse(localStorage.getItem('lend')) || [],
  priceLog: JSON.parse(localStorage.getItem('priceLog')) || []
};
let view = 'list';
let page = 1;
let pageSize = 20;
let sortKey = '';

function save(){
  localStorage.setItem('cards', JSON.stringify(db.cards));
  localStorage.setItem('ioLog', JSON.stringify(db.ioLog));
  localStorage.setItem('lend', JSON.stringify(db.lend));
  localStorage.setItem('priceLog', JSON.stringify(db.priceLog));
}

function autoBackup(){
  let last = localStorage.getItem('lastBackup');
  let today = new Date().toDateString();
  if(last !== today){
    backup();
    localStorage.setItem('lastBackup', today);
  }
}

function toggleDark(){
  document.body.classList.toggle('dark');
}

function fillFilter(){
  let ver = {}, rare={}, owner={}, tag={};
  db.cards.forEach(c=>{ ver[c.version] = 1; rare[c.rare] = 1; owner[c.owner] = 1; tag[c.tag] = 1; });
  document.getElementById('ver').innerHTML = '<option value="">全部版本</option>'+Object.keys(ver).map(v=>`<option value="${v}">${v}</option>`).join('');
  document.getElementById('rare').innerHTML = '<option value="">全部稀有度</option>'+Object.keys(rare).map(v=>`<option value="${v}">${v}</option>`).join('');
  document.getElementById('owner').innerHTML = '<option value="">全部归属</option>'+Object.keys(owner).map(v=>`<option value="${v}">${v}</option>`).join('');
  document.getElementById('tag').innerHTML = '<option value="">全部标签</option><option value="自留">自留</option><option value="可出">可出</option><option value="已预定">已预定</option><option value="借出">借出</option><option value="待补货">待补货</option>';
}

function filterList(){
  let kw = document.getElementById('kw').value.toLowerCase();
  let v = document.getElementById('ver').value;
  let r = document.getElementById('rare').value;
  let o = document.getElementById('owner').value;
  let t = document.getElementById('tag').value;
  let s = document.getElementById('stock').value;
  let p = document.getElementById('price').value;
  let warn = Number(document.getElementById('warn').value) || 2;

  return db.cards.filter(c=>{
    if(kw && !c.code?.toLowerCase().includes(kw) && !c.name?.toLowerCase().includes(kw)) return false;
    if(v && c.version!==v) return false;
    if(r && c.rare!==r) return false;
    if(o && c.owner!==o) return false;
    if(t && c.tag!==t) return false;
    if(s==='has' && c.qty<=0) return false;
    if(s==='zero' && c.qty>0) return false;
    if(s==='gt2' && c.qty<=2) return false;
    if(s==='gt5' && c.qty<=5) return false;
    let m = Number(c.market)||0;
    if(p==='0-50' && !(m>=0 && m<=50)) return false;
    if(p==='50-200' && !(m>50 && m<=200)) return false;
    if(p==='200+' && m<200) return false;
    return true;
  });
}

function sortList(arr){
  let s = document.getElementById('sort').value;
  if(!s) return arr;
  return [...arr].sort((a,b)=>{
    if(s==='code') return (a.code||'').localeCompare(b.code||'');
    if(s==='name') return (a.name||'').localeCompare(b.name||'');
    if(s==='qty') return (a.qty||0)-(b.qty||0);
    if(s==='market') return (a.market||0)-(b.market||0);
  });
}

function stat(){
  let t = db.cards.length;
  let qty = db.cards.reduce((a,b)=>a+(b.qty||0),0);
  let cost = db.cards.reduce((a,b)=>a+(b.cost||0)*(b.qty||0),0);
  let market = db.cards.reduce((a,b)=>a+(b.market||0)*(b.qty||0),0);
  let zero = db.cards.filter(x=>x.qty<=0).length;
  document.getElementById('s1').textContent = t;
  document.getElementById('s2').textContent = qty;
  document.getElementById('s3').textContent = '¥'+cost.toFixed(2);
  document.getElementById('s4').textContent = '¥'+market.toFixed(2);
  document.getElementById('s5').textContent = '¥'+(market-cost).toFixed(2);
  document.getElementById('s6').textContent = zero;
}

function load(){
  pageSize = Number(document.getElementById('pageSize').value);
  let list = filterList();
  list = sortList(list);
  let total = list.length;
  let maxPage = Math.ceil(total/pageSize);
  if(page>maxPage) page=maxPage;
  let start = (page-1)*pageSize;
  let data = list.slice(start, start+pageSize);
  stat(); fillFilter(); render(data); renderPage(maxPage);
}

function render(list){
  let warn = Number(document.getElementById('warn').value)||2;
  let html = '';
  if(view==='grid') html+='<div class="grid-view">';
  list.forEach((c,i)=>{
    let low = c.qty < warn ? 'low-stock' : '';
    let img = c.img ? `<img src="${c.img}" style="width:100%;border-radius:8px;margin-bottom:8px">` : '';
    if(view==='grid'){
      html+=`<div class="card-item" onclick="detail(${i})">${img}<div>编号：${c.code||''}</div><div>名称：${c.name}</div><div class="${low}">库存：${c.qty}</div><div>标签：<span class='tag'>${c.tag||''}</span></div></div>`;
    } else if(view==='table'){
      html+=`<tr><td><input type='checkbox' class='batch' value='${i}'></td><td>${c.code||''}</td><td>${c.name}</td><td>${c.version||''}</td><td>${c.rare||''}</td><td class='${low}'>${c.qty}</td><td>${c.market||0}</td><td>${c.owner||''}</td><td>${c.tag||''}</td><td><button class='btn btn-sm btn-primary' onclick="detail(${i})">详情</button></td></tr>`;
    } else {
      html+=`<div class='card-item' onclick="detail(${i})"><div>编号：${c.code||''}</div><div>名称：${c.name}</div><div>库存：<span class='${low}'>${c.qty}</span></div><div>标签：<span class='tag'>${c.tag||''}</span></div><div>备注：${c.remark||''}</div></div>`;
    }
  });
  if(view==='grid') html+='</div>';
  if(view==='table') html = `<table class='table table-view'><tr><th></th><th>编号</th><th>名称</th><th>版本</th><th>稀有度</th><th>库存</th><th>市价</th><th>归属</th><th>标签</th><th>操作</th></tr>${html}</table>`;
  document.getElementById('app').innerHTML = html;
}

function renderPage(max){
  let html = `<div class='pagination'><button class='btn btn-sm' onclick="page=1;load()">首页</button><button class='btn btn-sm' onclick="page--;load()">上页</button><span> ${page}/${max} </span><button class='btn btn-sm' onclick="page++;load()">下页</button><button class='btn btn-sm' onclick="page=${max};load()">末页</button></div>`;
  document.getElementById('pageBar').innerHTML = max>1 ? html : '';
}

function show(v){ view=v; load(); }

window.onload = () => { autoBackup(); load(); };
</script>
</body>
</html>
