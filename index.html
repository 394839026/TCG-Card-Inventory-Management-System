<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG卡牌管理 - 极速线上版</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root { --primary: #4361ee; --card-bg: #fff; --body-bg: #f8f9fc; --text: #21252d; }
.dark-mode { --primary: #8ab4f8; --card-bg: #1e1e2e; --body-bg: #121212; --text: #e9ecef; }
body { background: var(--body-bg); color: var(--text); transition: 0.3s; }
.card { background: var(--card-bg) !important; border: 0; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.btn-primary { background: var(--primary) !important; border: 0; }
.searchResultItem { padding:6px 10px; cursor:pointer; border-bottom:1px solid #ddd }
.searchResultItem:hover { background:#f0f0f0 }
.card-img-preview { width:100%; height:160px; object-fit:cover; border-radius:8px }
#cardGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1rem }
</style>
</head>
<body>

<div class="container py-4">
  <!-- 登录 -->
  <div id="authBox" class="card p-4 mx-auto mt-5" style="max-width:420px">
    <h3 class="text-center mb-3">TCG 卡牌管理</h3>
    <input class="form-control mb-2" id="username" placeholder="用户名">
    <input class="form-control mb-2" id="password" type="password" placeholder="密码">
    <button class="btn btn-primary w-100 mb-2" onclick="userLogin()">登录</button>
    <button class="btn btn-outline-secondary w-100" onclick="userRegister()">注册</button>
    <div class="mt-2 text-center small text-muted">每人独立账号</div>
  </div>

  <!-- 主界面 -->
  <div id="mainBox" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2><i class="bi bi-collection"></i> 卡牌库存</h2>
      <div class="d-flex gap-3 align-items-center">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" id="hideZeroStock">
          <label class="form-check-label">库存0隐藏</label>
        </div>
        <button id="darkBtn" class="btn btn-sm btn-secondary"><i class="bi bi-moon"></i></button>
        <button class="btn btn-sm btn-danger" onclick="userLogout()">退出</button>
      </div>
    </div>

    <input class="form-control mb-3" id="globalSearch" placeholder="搜索...">

    <div class="mb-4 flex-wrap d-flex gap-2">
      <button class="btn btn-primary" onclick="showPage('cards')">卡牌</button>
      <button class="btn btn-primary" onclick="showPage('trades')">交易</button>
      <button class="btn btn-primary" onclick="showPage('dashboard')">总览</button>
      <button class="btn btn-primary" onclick="showPage('addCard')">添加</button>
      <button class="btn btn-primary" onclick="showPage('bulkBuy')">批量买入</button>
      <button class="btn btn-primary" onclick="showPage('bulkSell')">批量卖出</button>
      <button class="btn btn-success" onclick="exportExcel()">导出Excel</button>
      <button class="btn btn-warning" onclick="importExcel()">导入Excel</button>
    </div>

    <div id="cards" class="page">
      <div id="cardGrid"></div>
    </div>

    <div id="trades" class="page d-none">
      <div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>卡牌</th><th>类型</th><th>金额</th><th>日期</th></tr></thead><tbody id="tradeTable"></tbody></table></div>
    </div>

    <div id="dashboard" class="page d-none">
      <div class="card p-4">
        <div class="row text-center">
          <div class="col-4"><div class="p-3 bg-primary bg-opacity-10 rounded"><h6>总数量</h6><h3 id="totalCount">0</h3></div></div>
          <div class="col-4"><div class="p-3 bg-success bg-opacity-10 rounded"><h6>总市值</h6><h3 id="totalPrice">0</h3></div></div>
          <div class="col-4"><div class="p-3 bg-warning bg-opacity-10 rounded"><h6>总成本</h6><h3 id="totalActual">0</h3></div></div>
        </div>
      </div>
    </div>

    <div id="addCard" class="page d-none">
      <div class="card p-4">
        <input class="form-control mb-2" id="cName" placeholder="名称">
        <input class="form-control mb-2" id="cSet" placeholder="版本">
        <input class="form-control mb-2" id="cRare" placeholder="稀有度">
        <input class="form-control mb-2" id="cQty" type="number" placeholder="库存">
        <input class="form-control mb-2" id="cPrice" placeholder="市场价">
        <input class="form-control mb-2" id="cActual" placeholder="成本价">
        <select class="form-control mb-2" id="cOwnerType"><option>自有</option><option>代卖</option></select>
        <button class="btn btn-primary w-100" onclick="addCard()">保存</button>
      </div>
    </div>

    <div id="bulkBuy" class="page d-none">
      <div class="card p-4"><h5>批量买入</h5><div id="bulkBuyList"></div><button class="btn btn-secondary mb-2" onclick="addBuyLine()">+添加</button><button class="btn btn-primary w-100" onclick="doBuy()">确认买入</button></div>
    </div>

    <div id="bulkSell" class="page d-none">
      <div class="card p-4"><h5>批量卖出</h5><div id="bulkSellList"></div><button class="btn btn-secondary mb-2" onclick="addSellLine()">+添加</button><button class="btn btn-primary w-100" onclick="doSell()">确认卖出</button></div>
    </div>
  </div>
</div>

<script>
// 防抖（解决卡顿核心）
function debounce(func, wait = 220) {
  let timeout;
  return (...args) => { clearTimeout(timeout); timeout = setTimeout(() => func.apply(this, args), wait) }
}

// 用户系统
let currentUser = null;
let db = { cards: [], trades: [] };

function userRegister() {
  const name = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  if (!name || !pwd) return alert('请输入账号密码');
  if (localStorage.getItem('TCG_USER_' + name)) return alert('已存在');
  localStorage.setItem('TCG_USER_' + name, JSON.stringify({ pwd, cards: [], trades: [] }));
  alert('注册成功');
}

function userLogin() {
  const name = document.getElementById('username').value.trim();
  const pwd = document.getElementById('password').value.trim();
  const data = localStorage.getItem('TCG_USER_' + name);
  if (!data) return alert('用户不存在');
  const user = JSON.parse(data);
  if (user.pwd !== pwd) return alert('密码错误');
  currentUser = name;
  db = user;
  document.getElementById('authBox').classList.add('d-none');
  document.getElementById('mainBox').classList.remove('d-none');
  showPage('cards');
}

function userLogout() { location.reload() }
function saveUser() {
  localStorage.setItem('TCG_USER_' + currentUser, JSON.stringify(db));
}

// 暗黑
let dark = localStorage.getItem('dark')==='1';
if (dark) document.body.classList.add('dark-mode');
document.getElementById('darkBtn').onclick = ()=>{
  dark = !dark; document.body.classList.toggle('dark-mode');
  localStorage.setItem('dark', dark?'1':'0');
}

// 页面
let currentSearch = '';
function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.add('d-none'));
  document.getElementById(id).classList.remove('d-none');
  if(id==='cards') loadCards();
  if(id==='trades') loadTrades();
  if(id==='dashboard') refreshDash();
}

// 搜索防抖
document.getElementById('globalSearch').oninput = debounce((e)=>{
  currentSearch = e.target.value.toLowerCase();
  loadCards();
});

function isHideZero() {
  return document.getElementById('hideZeroStock').checked;
}
document.getElementById('hideZeroStock').onchange = ()=>loadCards();

// 极速渲染卡牌
function loadCards() {
  const box = document.getElementById('cardGrid');
  box.innerHTML = '';
  const hide = isHideZero();
  const frag = document.createDocumentFragment();

  db.cards.forEach((c, idx)=>{
    if (hide && c.qty <= 0) return;
    const txt = (c.name + c.set + c.rarity).toLowerCase();
    if (currentSearch && !txt.includes(currentSearch)) return;

    const div = document.createElement('div');
    div.className = 'card p-3';
    div.innerHTML = `
      <h6 class="mb-1">${c.name}</h6>
      <small class="text-muted">${c.set||''} ${c.rarity||''}</small>
      <div>库存：${c.qty}</div>
      <div>市价：${c.price}</div>
      <div>成本：${c.actual}</div>
      <div class="d-flex gap-2 mt-2">
        <button class="btn btn-sm btn-warning" onclick="edit(${idx})">改</button>
        <button class="btn btn-sm btn-danger" onclick="del(${idx})">删</button>
      </div>`;
    frag.appendChild(div);
  });
  box.appendChild(frag);
}

// 总览
function refreshDash() {
  let tc=0,tp=0,ta=0;
  db.cards.forEach(c=>{ tc+=c.qty||0; tp+=(c.qty||0)*c.price||0; ta+=(c.qty||0)*c.actual||0 });
  document.getElementById('totalCount').innerText=tc;
  document.getElementById('totalPrice').innerText=tp.toFixed(2);
  document.getElementById('totalActual').innerText=ta.toFixed(2);
}

// 添加修改删除
function addCard() {
  const c = {
    name:document.getElementById('cName').value.trim(),
    set:document.getElementById('cSet').value.trim(),
    rarity:document.getElementById('cRare').value.trim(),
    qty:+document.getElementById('cQty').value||0,
    price:+document.getElementById('cPrice').value||0,
    actual:+document.getElementById('cActual').value||0,
    ownerType:document.getElementById('cOwnerType').value
  };
  if(!c.name)return alert('请填名称');
  db.cards.push(c); saveUser(); showPage('cards');
}
function edit(idx){ const c=db.cards[idx];
  document.getElementById('cName').value=c.name;
  document.getElementById('cSet').value=c.set||'';
  document.getElementById('cRare').value=c.rarity||'';
  document.getElementById('cQty').value=c.qty;
  document.getElementById('cPrice').value=c.price;
  document.getElementById('cActual').value=c.actual;
  document.getElementById('cOwnerType').value=c.ownerType||'自有';
  showPage('addCard'); setTimeout(()=>db.cards.splice(idx,1),0);
}
function del(idx){ if(!confirm('确定删除？'))return; db.cards.splice(idx,1); saveUser(); loadCards(); }

// 交易
function loadTrades() {
  const t=document.getElementById('tradeTable'); t.innerHTML='';
  db.trades.forEach((tr,i)=>{
    t.innerHTML+=`<tr><td>${i+1}</td><td>${tr.name}</td><td>${tr.type}</td><td>${tr.money}</td><td>${tr.date}</td></tr>`
  })
}

// 批量买入卖出简化版（极速）
let buyLine=1,sellLine=1;
function addBuyLine(){ const d=document.createElement('div'); d.className='d-flex gap-2 mb-2';
d.innerHTML=`<input class="form-control" placeholder="卡牌名"> <input class="form-control" type="number" placeholder="数量"> <input class="form-control" type="number" placeholder="单价">`;
document.getElementById('bulkBuyList').appendChild(d); }

function addSellLine(){ const d=document.createElement('div'); d.className='d-flex gap-2 mb-2';
d.innerHTML=`<input class="form-control" placeholder="卡牌名"> <input class="form-control" type="number" placeholder="数量"> <input class="form-control" type="number" placeholder="单价">`;
document.getElementById('bulkSellList').appendChild(d); }

function doBuy(){ alert('买入成功（极速版简化）'); saveUser(); showPage('cards'); }
function doSell(){ alert('卖出成功（极速版简化）'); saveUser(); showPage('cards'); }

// Excel
function importExcel(){
  const i=document.createElement('input'); i.type='file'; i.accept='.xlsx';
  i.onchange=e=>{ const r=new FileReader(); r.onload=ev=>{
    const wb=XLSX.read(ev.target.result,{type:'array'});
    const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    data.forEach(row=>{
      const name=row['名称']||''; if(!name)return;
      const item={name,set:row['版本']||'',rarity:row['稀有度']||'',qty:row['库存']||0,price:row['市场价']||0,actual:row['成本价']||0,ownerType:'自有'};
      const ex=db.cards.findIndex(x=>x.name===name&&x.set===item.set);
      ex>=0?db.cards[ex]=item:db.cards.push(item);
    });
    saveUser(); loadCards(); alert('导入完成');
  }; r.readAsArrayBuffer(e.target.files[0]); }
  i.click();
}

function exportExcel(){
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(db.cards),'卡牌');
  XLSX.writeFile(wb,'TCG_data.xlsx');
}
</script>
</body>
</html>
